name: Update Stock Prices

on:
  schedule:
    - cron: '10 7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Toss prices
        env:
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, re, os, datetime, base64
          CLIENT_ID = os.environ['TOSS_CLIENT_ID']
          CLIENT_SECRET = os.environ['TOSS_CLIENT_SECRET']
          BASE = 'https://openapi.tossinvest.com'

          # A 접두사 붙인 종목코드
          SYMBOLS = {
            'SK하이닉스':       'A000660',
            'TIGER SK하닉레버': 'A0195S0',
            '삼성전자':         'A005930',
            'TIGER삼성레버':    'A0195R0',
            '현대차':           'A005380',
          }

          credentials = base64.b64encode(f'{CLIENT_ID}:{CLIENT_SECRET}'.encode()).decode()
          params = urllib.parse.urlencode({'grant_type':'client_credentials'}).encode()
          req = urllib.request.Request(BASE+'/oauth2/token',data=params,
            headers={'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+credentials})
          with urllib.request.urlopen(req) as r:
            token = json.loads(r.read())['access_token']
          print('토큰 발급 완료')

          # A 접두사 / 비접두사 조합으로 시도
          symbol_str = ','.join(SYMBOLS.values())
          symbol_str_no_a = ','.join(v.lstrip('A') for v in SYMBOLS.values())
          endpoints = [
            f'{BASE}/api/v1/stocks?symbols={symbol_str}',
            f'{BASE}/api/v1/stocks?symbols={symbol_str_no_a}',
            f'{BASE}/api/v1/stocks/quotes?symbols={symbol_str}',
            f'{BASE}/api/v1/stocks/quotes?symbols={symbol_str_no_a}',
          ]

          price_data = None
          used_ep = ''
          for ep in endpoints:
            try:
              req2 = urllib.request.Request(ep, headers={'Authorization':'Bearer '+token})
              with urllib.request.urlopen(req2) as r:
                price_data = json.loads(r.read())
              used_ep = ep
              print(f'성공: {ep}')
              print(f'응답: {json.dumps(price_data, ensure_ascii=False)[:500]}')
              break
            except Exception as e:
              print(f'실패 {ep}: {e}')

          if not price_data:
            raise Exception('모든 엔드포인트 실패')

          # 가격 파싱 (다양한 키 시도)
          items = price_data.get('stocks') or price_data.get('data') or price_data.get('quotes') or []
          if isinstance(price_data, list): items = price_data
          price_map = {}
          for item in (items if isinstance(items, list) else []):
            sym = item.get('symbol') or item.get('ticker') or item.get('code') or ''
            sym_clean = sym.lstrip('A')
            price = (item.get('currentPrice') or item.get('price') or
                     item.get('tradePrice') or item.get('closePrice') or item.get('close'))
            if sym_clean and price:
              price_map[sym_clean] = int(price)
          print('가격:', price_map)

          # HTML 업데이트 (A 없는 코드 기준)
          rev = {v.lstrip('A'): k for k, v in SYMBOLS.items()}
          with open('index.html','r',encoding='utf-8') as f: html = f.read()
          updated = []
          for sym, price in price_map.items():
            name = rev.get(sym, sym)
            new_html, n = re.subn(rf"(name:'{re.escape(name)}'[^}}]+curPrice:)\d+", rf'\g<1>{price}', html)
            if n > 0:
              html = new_html
              updated.append(f'{name}:{price:,}')
              print(f'  ✅ {name} -> {price:,}원')
            else:
              print(f'  ⚠️ {name} 패턴 미매칭')
          kst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          html = re.sub(r'\d{4}-\d{2}-\d{2}[^<"]*', kst.strftime('%Y-%m-%d %H:%M KST 자동갱신'), html, count=1)
          with open('index.html','w',encoding='utf-8') as f: f.write(html)
          print('완료:', ', '.join(updated))
          PYEOF

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Fernando-IM/make5bil.git
          git add index.html
          git diff --staged --quiet || git commit -m "auto: 시세 자동갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
