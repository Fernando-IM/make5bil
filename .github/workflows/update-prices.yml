name: Update Stock Prices

on:
  schedule:
    - cron: '10 7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Toss prices
        env:
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import urllib.request, urllib.parse, json, re, os, datetime, base64
          CLIENT_ID = os.environ['TOSS_CLIENT_ID']
          CLIENT_SECRET = os.environ['TOSS_CLIENT_SECRET']
          BASE = 'https://openapi.tossinvest.com'
          SYMBOLS = {'SK하이닉스':'000660','TIGER SK하닉레버':'0195S0','삼성전자':'005930','TIGER삼성레버':'0195R0','현대차':'005380'}

          credentials = base64.b64encode(f'{CLIENT_ID}:{CLIENT_SECRET}'.encode()).decode()
          params = urllib.parse.urlencode({'grant_type':'client_credentials'}).encode()
          req = urllib.request.Request(BASE+'/oauth2/token',data=params,headers={'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+credentials})
          with urllib.request.urlopen(req) as r:
            resp = json.loads(r.read())
          token = resp['access_token']
          print('토큰 발급 완료')

          # 엔드포인트 여러 개 시도
          symbol_str = ','.join(SYMBOLS.values())
          endpoints = [
            f'{BASE}/api/v1/quotes?symbols={symbol_str}',
            f'{BASE}/api/v1/stocks/quotes?symbols={symbol_str}',
            f'{BASE}/api/v1/market-data/stocks?symbols={symbol_str}',
            f'{BASE}/api/v1/stocks?symbols={symbol_str}',
          ]
          price_data = None
          for ep in endpoints:
            try:
              req2 = urllib.request.Request(ep, headers={'Authorization':'Bearer '+token})
              with urllib.request.urlopen(req2) as r:
                price_data = json.loads(r.read())
              print(f'성공 엔드포인트: {ep}')
              print(f'응답: {json.dumps(price_data, ensure_ascii=False)[:300]}')
              break
            except Exception as e:
              print(f'실패 {ep}: {e}')

          if not price_data:
            raise Exception('모든 엔드포인트 실패')

          items = price_data.get('stocks') or price_data.get('data') or price_data.get('quotes') or price_data
          price_map = {}
          if isinstance(items,list):
            for item in items:
              sym = item.get('symbol') or item.get('ticker') or item.get('code')
              price = item.get('currentPrice') or item.get('price') or item.get('tradePrice') or item.get('closePrice') or item.get('close')
              if sym and price: price_map[sym]=int(price)
          print('가격:', price_map)

          with open('index.html','r',encoding='utf-8') as f: html=f.read()
          rev = {v:k for k,v in SYMBOLS.items()}
          updated=[]
          for sym,price in price_map.items():
            name=rev.get(sym,sym)
            new_html,n=re.subn(rf"(name:'{re.escape(name)}'[^}}]+curPrice:)\d+",rf'\g<1>{price}',html)
            if n>0: html=new_html; updated.append(f'{name}:{price:,}'); print(f'  {name} -> {price:,}')
            else: print(f'  ⚠️ {name} 패턴 미매칭')
          kst=datetime.datetime.utcnow()+datetime.timedelta(hours=9)
          html=re.sub(r'\d{4}-\d{2}-\d{2}[^<"]*',kst.strftime('%Y-%m-%d %H:%M KST 자동갱신'),html,count=1)
          with open('index.html','w',encoding='utf-8') as f: f.write(html)
          print('완료:', ', '.join(updated))
          PYEOF

      - name: Commit & Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Fernando-IM/make5bil.git
          git add index.html
          git diff --staged --quiet || git commit -m "auto: 시세 자동갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
